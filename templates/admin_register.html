{% extends "layout.html" %} {% block title %}Admin Registration{% endblock %} {%
block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Admin Registration</h4>
        </div>
        <div class="card-body">
          <form method="POST" action="{{ url_for('auth.admin_register') }}">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input
                type="text"
                name="username"
                id="username"
                class="form-control"
                required
                autofocus
              />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input
                type="email"
                name="email"
                id="email"
                class="form-control"
                required
              />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                name="password"
                id="password"
                class="form-control"
                required
                minlength="8"
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Register as Admin
            </button>
          </form>
          <div class="mt-3 text-center">
            <a href="{{ url_for('auth.admin_login') }}"
              >Already an admin? Login here</a
            >
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
